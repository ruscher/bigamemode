<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the BiGameMode service on the system bus -->
  <policy user="root">
    <allow own="com.biglinux.BiGameMode"/>
  </policy>

  <!-- Allow any user to invoke methods on the interface -->
  <policy context="default">
    <allow send_destination="com.biglinux.BiGameMode"/>
    <allow receive_sender="com.biglinux.BiGameMode"/>
  </policy>
</busconfig>
