<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="org.falcond"/>
    <allow send_destination="org.falcond"/>
    <allow receive_sender="org.falcond"/>
  </policy>
  <policy group="falcond">
    <allow own="org.falcond"/>
    <allow send_destination="org.falcond"/>
    <allow receive_sender="org.falcond"/>
  </policy>
  <policy context="default">
    <deny own="org.falcond"/>
    <allow send_destination="org.falcond"/>
    <allow receive_sender="org.falcond"/>
  </policy>
</busconfig>
