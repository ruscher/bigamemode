# Falcon Daemon Configuration
# This file is managed by BiGame-mode

[daemon]
# Directory where the status file will be written
status_dir = "/run/falcond"
# Directory for logs
log_dir = "/var/log/falcond"
# Interval to scan /proc for new processes
poll_interval_ms = 9000
# Enable performance optimizations by default
enable_performance_mode = true

[scx]
# Default sched-ext scheduler (none, rusty, etc.)
scheduler = "none"
# Scheduler tuning mode
mode = "default"
